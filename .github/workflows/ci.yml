name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libssl-dev

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DSYPHAX_WEB_BUILD_EXAMPLES=ON
          -DSYPHAX_WEB_BUILD_TESTS=ON
          -DSYPHAX_WEB_ENABLE_WARNINGS=ON

      - name: Build
        run: cmake --build build --parallel "$(nproc)"

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Install smoke test
        run: |
          cmake --install build --prefix "${{ github.workspace }}/install"
          test -f "${{ github.workspace }}/install/share/syphax_web/translations.json"

      - name: Consumer smoke test
        run: |
          mkdir -p consumer
          cat > consumer/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.22)
          project(syphax_web_consumer C)
          find_package(syphax_web CONFIG REQUIRED)
          add_executable(consumer main.c)
          target_link_libraries(consumer PRIVATE syphax_web::syphax_web)
          EOF
          cat > consumer/main.c <<'EOF'
          #include "sw_html.h"
          int main(void) {
              sw_buffer* buffer = sw_buffer_new();
              sw_buffer_free(buffer);
              return 0;
          }
          EOF
          cmake -S consumer -B consumer/build -G Ninja -DCMAKE_PREFIX_PATH="${{ github.workspace }}/install"
          cmake --build consumer/build --parallel "$(nproc)"

      - name: Configure shared
        run: >
          cmake -S . -B build-shared -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_SHARED_LIBS=ON
          -DSYPHAX_WEB_BUILD_EXAMPLES=ON
          -DSYPHAX_WEB_BUILD_TESTS=ON
          -DSYPHAX_WEB_ENABLE_WARNINGS=ON

      - name: Build shared
        run: cmake --build build-shared --parallel "$(nproc)"

      - name: Run shared tests
        run: ctest --test-dir build-shared --output-on-failure

      - name: Check shared exports
        run: |
          nm -D --defined-only build-shared/libsyphax_web.so | awk '{print $3}' | sort > shared-symbols.txt
          grep -qx sw_http_listen_tls shared-symbols.txt
          grep -qx sw_translator_add shared-symbols.txt
          grep -qx sw_js_live shared-symbols.txt
          ! grep -E '(_internal|_cfg|sw_backend_|sw_socket_|sw_char_array_|sw_strdup_|sw_now_ms|sw_read_file|sw_http_status_text)' shared-symbols.txt

      - name: Shared install smoke test
        run: |
          cmake --install build-shared --prefix "${{ github.workspace }}/install-shared"
          test -f "${{ github.workspace }}/install-shared/share/syphax_web/translations.json"
          mkdir -p consumer-shared
          cat > consumer-shared/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.22)
          project(syphax_web_consumer_shared C)
          find_package(syphax_web CONFIG REQUIRED)
          add_executable(consumer_shared main.c)
          target_link_libraries(consumer_shared PRIVATE syphax_web::syphax_web)
          EOF
          cat > consumer-shared/main.c <<'EOF'
          #include "sw_server.h"
          int main(void) {
              sw_http_config config = sw_http_config_default();
              return config.max_body_bytes == 0;
          }
          EOF
          cmake -S consumer-shared -B consumer-shared/build -G Ninja -DCMAKE_PREFIX_PATH="${{ github.workspace }}/install-shared"
          cmake --build consumer-shared/build --parallel "$(nproc)"

      - name: Configure TLS
        run: >
          cmake -S . -B build-tls -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DSYPHAX_WEB_BUILD_EXAMPLES=ON
          -DSYPHAX_WEB_BUILD_TESTS=ON
          -DSYPHAX_WEB_ENABLE_WARNINGS=ON
          -DSYPHAX_WEB_ENABLE_TLS=ON

      - name: Build TLS
        run: cmake --build build-tls --parallel "$(nproc)"

      - name: Run TLS tests
        run: ctest --test-dir build-tls --output-on-failure

  linux-sanitizers:
    name: Linux Sanitizers
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Configure
        env:
          CFLAGS: -fsanitize=address,undefined -fno-omit-frame-pointer
          LDFLAGS: -fsanitize=address,undefined
        run: >
          cmake -S . -B build-asan -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DSYPHAX_WEB_BUILD_EXAMPLES=ON
          -DSYPHAX_WEB_BUILD_TESTS=ON
          -DSYPHAX_WEB_ENABLE_WARNINGS=ON

      - name: Build
        env:
          CFLAGS: -fsanitize=address,undefined -fno-omit-frame-pointer
          LDFLAGS: -fsanitize=address,undefined
        run: cmake --build build-asan --parallel "$(nproc)"

      - name: Run tests
        env:
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: print_stacktrace=1
        run: ctest --test-dir build-asan --output-on-failure

  windows:
    name: Windows
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DSYPHAX_WEB_BUILD_EXAMPLES=ON
          -DSYPHAX_WEB_BUILD_TESTS=ON
          -DSYPHAX_WEB_ENABLE_WARNINGS=ON

      - name: Build
        run: cmake --build build --parallel "$(nproc)"

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Install smoke test
        run: |
          cmake --install build --prefix "$PWD/install"
          test -f "$PWD/install/share/syphax_web/translations.json"
